<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YIM Data Privacy Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        yim: {
                            50: '#f0f7f8',
                            100: '#e7ecee',
                            200: '#d8e6ea',
                            300: '#a8bac1',
                            500: '#6daeba',
                            600: '#346474',
                            700: '#265263',
                            900: '#2f3436',
                            950: '#111313',
                            green: '#0cbe53',
                            red: '#e53e3e',
                            orange: '#dd6b20'
                        }
                    },
                    fontFamily: {
                        nunito: ['Nunito', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-yim-50 font-nunito">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Data model
        const personData = {
            personal: {
                firstName: "Jan",
                lastName: "de Vries",
                email: "jan.devries@example.nl",
                phone: "+31 6 1234 5678",
                dateOfBirth: "1985-03-15",
                bsn: "123456789",
                nationality: "Nederlandse",
                address: "Kerkstraat 123, 3011 AB Rotterdam"
            },
            employment: {
                company: "ABC Bouw B.V.",
                kvkNumber: "12345678",
                employeeNumber: "EMP-2024-001",
                function: "Projectleider",
                department: "Bouw & Onderhoud",
                contractType: "Vast contract",
                startDate: "2023-01-15"
            },
            compliance: {
                vca: { status: "Geldig", expiryDate: "2025-12-31", number: "VCA-2024-1234" },
                vog: { status: "Geldig", expiryDate: "2026-03-15", number: "VOG-2023-5678" },
                safety: { status: "Voltooid", completionDate: "2024-01-10" },
                covid: { status: "Voltooid", date: "2023-09-20" }
            },
            access: {
                sites: ["Shell Pernis", "Shell Moerdijk", "Hoofdkantoor Rotterdam"],
                zones: ["Productie Area A", "Kantoor", "Parkeerterrein"],
                cardNumber: "CARD-2024-001234",
                validUntil: "2025-12-31",
                lastAccess: "2025-02-03 08:45"
            }
        };

        // Visibility Profiles - separate from roles, determine field-level visibility
        const initialVisibilityProfiles = [
            {
                id: 'full',
                name: 'Volledige inzage',
                description: 'Alle velden en dossieronderdelen zichtbaar',
                canReveal: true,
                dataGroups: {
                    identity: 'show', contact_work: 'show', address: 'show',
                    government_id: 'show', compliance: 'show', hours: 'show',
                    employment: 'show', access: 'show'
                },
                dossierComponents: {
                    foto: 'show', identificatie_locatie: 'show', identificatie_bsn: 'show',
                    posted_worker: 'show', sociale_lasten: 'show',
                    gewerkte_uren: 'show', vca_certificaten: 'show'
                }
            },
            {
                id: 'standard',
                name: 'Standaard inzage',
                description: 'Basis- en werkgerelateerde velden, gevoelige data verborgen',
                canReveal: true,
                dataGroups: {
                    identity: 'show', contact_work: 'show', address: 'hidden',
                    government_id: 'hidden', compliance: 'show', hours: 'show',
                    employment: 'show', access: 'hidden'
                },
                dossierComponents: {
                    foto: 'show', identificatie_locatie: 'show', identificatie_bsn: 'hidden',
                    posted_worker: 'show', sociale_lasten: 'hidden',
                    gewerkte_uren: 'show', vca_certificaten: 'show'
                }
            },
            {
                id: 'operational',
                name: 'Operationele inzage',
                description: 'Basisidentificatie, compliance en uren',
                canReveal: false,
                dataGroups: {
                    identity: 'show', contact_work: 'hidden', address: 'hidden',
                    government_id: 'hidden', compliance: 'show', hours: 'show',
                    employment: 'hidden', access: 'show'
                },
                dossierComponents: {
                    foto: 'show', identificatie_locatie: 'hidden', identificatie_bsn: 'hidden',
                    posted_worker: 'hidden', sociale_lasten: 'hidden',
                    gewerkte_uren: 'show', vca_certificaten: 'show'
                }
            },
            {
                id: 'minimal',
                name: 'Minimale inzage',
                description: 'Alleen naam en VCA-certificaten',
                canReveal: false,
                dataGroups: {
                    identity: 'show', contact_work: 'hidden', address: 'hidden',
                    government_id: 'hidden', compliance: 'hidden', hours: 'hidden',
                    employment: 'hidden', access: 'hidden'
                },
                dossierComponents: {
                    foto: 'hidden', identificatie_locatie: 'hidden', identificatie_bsn: 'hidden',
                    posted_worker: 'hidden', sociale_lasten: 'hidden',
                    gewerkte_uren: 'hidden', vca_certificaten: 'show'
                }
            }
        ];

        const initialRoles = {
            admin: {
                name: "Administrator",
                description: "Volledige toegang",
                visibilityProfileId: 'full'
            },
            hr: {
                name: "HR Manager",
                description: "Persoons- en arbeidsgegevens",
                visibilityProfileId: 'standard'
            },
            security: {
                name: "Security Manager",
                description: "Compliance en toegang",
                visibilityProfileId: 'operational'
            },
            contractor: {
                name: "Contractor",
                description: "Beperkte toegang",
                visibilityProfileId: 'operational'
            },
            guest: {
                name: "Guest",
                description: "Basis verificatie",
                visibilityProfileId: 'minimal'
            }
        };

        function App({ roles, setRoles, visibilityProfiles, setVisibilityProfiles, currentTab, setCurrentTab }) {
            const [currentRole, setCurrentRole] = useState('admin');
            const [showHelp, setShowHelp] = useState(true);
            const [auditLog, setAuditLog] = useState([]);
            const [showAudit, setShowAudit] = useState(false);
            const [revealedFields, setRevealedFields] = useState({});

            // Handle deleted role - reset to first available role
            const roleKeys = Object.keys(roles);
            const validRole = roles[currentRole] ? currentRole : roleKeys[0];
            const role = roles[validRole];

            // Resolve visibility profile from role
            const profile = visibilityProfiles.find(p => p.id === role.visibilityProfileId);
            const canReveal = profile?.canReveal || false;

            // Log field reveal
            const logFieldReveal = (category, field, value) => {
                const entry = {
                    timestamp: new Date().toISOString(),
                    role: role.name,
                    category,
                    field,
                    value: value.substring(0, 20) + (value.length > 20 ? '...' : ''),
                    action: 'FIELD_REVEAL'
                };
                setAuditLog(prev => [entry, ...prev]);
            };

            // Handle field reveal with 5-second timeout
            const handleReveal = (fieldKey, category, field, value) => {
                if (!canReveal) return;

                setRevealedFields(prev => ({ ...prev, [fieldKey]: true }));
                logFieldReveal(category, field, value);

                // Auto-hide after 5 seconds
                setTimeout(() => {
                    setRevealedFields(prev => {
                        const updated = { ...prev };
                        delete updated[fieldKey];
                        return updated;
                    });
                }, 5000);
            };

            // Mask sensitive values (no permission levels - purely based on sensitivity)
            const maskSensitiveValue = (value, sensitive, isRevealed = false) => {
                if (isRevealed || !sensitive) return value;
                if (typeof value === 'string') {
                    if (value.includes('@')) {
                        const [user, domain] = value.split('@');
                        return `${user.substring(0, 2)}••••@${domain}`;
                    }
                    if (value.includes('+31')) return '+31 6 ••••••78';
                    if (value.length > 8) return value.substring(0, 3) + '••••••';
                }
                return '••••••••';
            };

            const DataField = ({ label, value, sensitive, fieldId, groupId }) => {
                // Check visibility from profile's dataGroups
                const groupVisibility = profile?.dataGroups[groupId] || 'hidden';
                if (groupVisibility === 'hidden') return null;

                const fieldKey = `${groupId}.${fieldId}`;
                const isRevealed = revealedFields[fieldKey];
                const displayValue = maskSensitiveValue(value, sensitive, isRevealed);
                const isMasked = sensitive && !isRevealed;
                const canRevealField = canReveal && isMasked;

                return (
                    <div className="flex justify-between items-start py-3 border-b border-yim-100 last:border-0 group">
                        <div className="flex items-center gap-2">
                            <span className="text-sm text-yim-600 opacity-70 w-36">{label}</span>
                            {isMasked && (
                                <svg className="w-3.5 h-3.5 text-yim-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            )}
                            {isRevealed && (
                                <span className="flex items-center gap-1 text-xs text-yim-green">
                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    5s
                                </span>
                            )}
                        </div>
                        <div className="flex items-center gap-2">
                            <span className={`text-sm font-medium ${isMasked ? 'text-yim-300' : 'text-yim-600'}`}>
                                {displayValue}
                            </span>
                            {canRevealField && (
                                <button
                                    onClick={() => handleReveal(fieldKey, groupId, label, value)}
                                    className="opacity-0 group-hover:opacity-100 transition-opacity px-2 py-1 text-xs font-medium text-yim-500 hover:text-yim-600 hover:bg-yim-50 rounded"
                                    title="Toon gedurende 5 seconden"
                                >
                                    Toon
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const VisibilityBadge = ({ visible }) => {
                return visible ? (
                    <span className="px-2.5 py-1 rounded-md text-xs font-medium bg-yim-green/10 text-yim-green border border-yim-green/30">
                        Zichtbaar
                    </span>
                ) : (
                    <span className="px-2.5 py-1 rounded-md text-xs font-medium bg-yim-50 text-yim-600 opacity-70 border border-yim-200">
                        Verborgen
                    </span>
                );
            };

            const DataSection = ({ title, groups, icon, children }) => {
                // Section is hidden if ALL its data groups are hidden
                const hasVisibleGroup = groups.some(g => profile?.dataGroups[g] === 'show');

                if (!hasVisibleGroup) {
                    return (
                        <div className="bg-white rounded-xl border border-yim-200 p-6 opacity-50">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-10 h-10 rounded-lg bg-yim-100 flex items-center justify-center">
                                    {icon}
                                </div>
                                <h3 className="text-base font-semibold text-yim-600 flex-1">{title}</h3>
                                <span className="text-xs text-yim-600 opacity-60 flex items-center gap-1">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
                                    </svg>
                                    Geen toegang
                                </span>
                            </div>
                            <p className="text-sm text-yim-600 opacity-60">Deze gegevens zijn niet zichtbaar voor uw rol.</p>
                        </div>
                    );
                }

                return (
                    <div className="bg-white rounded-xl border border-yim-200 p-6 hover:border-yim-300 transition-colors">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="w-10 h-10 rounded-lg bg-yim-50 flex items-center justify-center">
                                {icon}
                            </div>
                            <h3 className="text-base font-semibold text-yim-600 flex-1">{title}</h3>
                            <VisibilityBadge visible={true} />
                        </div>
                        <div>{children}</div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <div className="bg-white border-b border-yim-200 sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <svg className="w-8 h-8 text-yim-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                    </svg>
                                    <div>
                                        <h1 className="text-xl font-semibold text-yim-600">YIM Data Privacy</h1>
                                        <p className="text-sm text-yim-600 opacity-60">Rolgebaseerde toegangscontrole met audit logging</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="flex bg-yim-100 rounded-lg p-1">
                                        <button
                                            onClick={() => setCurrentTab('viewer')}
                                            className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${
                                                currentTab === 'viewer'
                                                    ? 'bg-white text-yim-600 shadow-sm'
                                                    : 'text-yim-600 opacity-70 hover:text-yim-600'
                                            }`}
                                        >
                                            Overzicht
                                        </button>
                                        <button
                                            onClick={() => setCurrentTab('admin')}
                                            className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${
                                                currentTab === 'admin'
                                                    ? 'bg-white text-yim-600 shadow-sm'
                                                    : 'text-yim-600 opacity-70 hover:text-yim-600'
                                            }`}
                                        >
                                            Admin
                                        </button>
                                    </div>
                                    {currentTab === 'viewer' && (
                                        <button
                                            onClick={() => setShowHelp(!showHelp)}
                                            className="text-sm text-yim-600 opacity-70 hover:text-yim-600"
                                        >
                                            {showHelp ? 'Verberg' : 'Toon'} profiel
                                        </button>
                                    )}
                                    <button
                                        onClick={() => setShowAudit(!showAudit)}
                                        className="relative px-4 py-2 bg-yim-700 text-white text-sm font-medium rounded-lg hover:bg-yim-600 transition-colors"
                                    >
                                        Audit Log
                                        {auditLog.length > 0 && (
                                            <span className="absolute -top-1 -right-1 w-5 h-5 bg-yim-red text-white text-xs rounded-full flex items-center justify-center">
                                                {auditLog.length}
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 py-8">
                        {currentTab === 'viewer' && (
                        <>
                        {/* Role Selector */}
                        <div className="mb-8">
                            <label className="block text-sm font-medium text-yim-600 mb-3">
                                Bekijk als gebruikersrol:
                            </label>
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                                {Object.entries(roles).map(([key, roleData]) => (
                                    <button
                                        key={key}
                                        onClick={() => setCurrentRole(key)}
                                        className={`p-4 rounded-xl border-2 text-left transition-all ${
                                            validRole === key
                                                ? 'border-yim-500 bg-yim-50'
                                                : 'border-yim-200 bg-white hover:border-yim-300'
                                        }`}
                                    >
                                        <div className="font-semibold text-sm mb-1 text-yim-600">
                                            {roleData.name}
                                        </div>
                                        <div className="text-xs text-yim-600 opacity-60 leading-relaxed mb-2">
                                            {roleData.description}
                                        </div>
                                        {(() => { const p = visibilityProfiles.find(p => p.id === roleData.visibilityProfileId); return p; })() && (
                                            <div className="text-xs text-yim-500 bg-yim-50 px-2 py-0.5 rounded mt-1">
                                                {visibilityProfiles.find(p => p.id === roleData.visibilityProfileId)?.name}
                                            </div>
                                        )}
                                        {(() => { const p = visibilityProfiles.find(p => p.id === roleData.visibilityProfileId); return p?.canReveal; })() && (
                                            <div className="flex items-center gap-1 text-xs text-yim-green mt-1">
                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                </svg>
                                                View rechten
                                            </div>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Profile Info */}
                        {showHelp && profile && (
                            <div className="mb-8 bg-yim-50 rounded-xl p-6 border border-yim-200">
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <h3 className="text-sm font-semibold text-yim-600 mb-1">
                                            Zichtbaarheidsprofiel: {profile.name}
                                        </h3>
                                        <p className="text-xs text-yim-600 opacity-70">
                                            {profile.description}
                                            {canReveal && ' · Hover over gemaskeerde velden om de "Toon" knop te zien (5 seconden zichtbaar)'}
                                        </p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-4 gap-3">
                                    {Object.entries(profile.dataGroups).map(([groupId, visibility]) => {
                                        const groupNames = {
                                            identity: 'Identiteit', contact_work: 'Contactgegevens', address: 'Adres',
                                            government_id: 'Overheid ID', compliance: 'Compliance', hours: 'Uren',
                                            employment: 'Arbeidsgegevens', access: 'Toegangsrechten'
                                        };
                                        return (
                                            <div key={groupId} className="bg-white rounded-lg p-3 border border-yim-200">
                                                <div className="text-xs font-medium text-yim-600 opacity-70 mb-2">
                                                    {groupNames[groupId] || groupId}
                                                </div>
                                                <VisibilityBadge visible={visibility === 'show'} />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Audit Log Modal */}
                        {showAudit && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-6">
                                <div className="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[80vh] overflow-hidden flex flex-col">
                                    <div className="p-6 border-b border-yim-200">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <h2 className="text-lg font-semibold text-yim-600">Audit Trail</h2>
                                                <p className="text-sm text-yim-600 opacity-70">Logging van ontsleutelde velden</p>
                                            </div>
                                            <button 
                                                onClick={() => setShowAudit(false)}
                                                className="text-yim-300 hover:text-yim-600 opacity-70"
                                            >
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6">
                                        {auditLog.length === 0 ? (
                                            <div className="text-center py-12">
                                                <svg className="w-16 h-16 text-yim-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                </svg>
                                                <p className="text-yim-600 opacity-60">Nog geen velden ontsleuteld</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {auditLog.map((entry, idx) => (
                                                    <div key={idx} className="bg-yim-50 rounded-lg p-4 border border-yim-200">
                                                        <div className="flex items-start justify-between mb-2">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-xs font-mono text-yim-600 opacity-60">
                                                                    {new Date(entry.timestamp).toLocaleTimeString('nl-NL')}
                                                                </span>
                                                                <span className="px-2 py-0.5 bg-yim-red/10 text-yim-red text-xs font-medium rounded">
                                                                    {entry.action}
                                                                </span>
                                                            </div>
                                                            <span className="text-xs text-yim-600 opacity-70">{entry.role}</span>
                                                        </div>
                                                        <div className="text-sm">
                                                            <span className="font-medium text-yim-600">{entry.category}</span>
                                                            <span className="text-yim-300 mx-2">→</span>
                                                            <span className="text-yim-600">{entry.field}</span>
                                                        </div>
                                                        <div className="mt-2 text-xs text-yim-600 opacity-60 font-mono bg-white px-2 py-1 rounded">
                                                            {entry.value}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="p-6 border-t border-yim-200 bg-yim-50">
                                        <div className="flex items-center justify-between text-sm text-yim-600 opacity-70">
                                            <span>Totaal: {auditLog.length} acties</span>
                                            <button 
                                                onClick={() => setAuditLog([])}
                                                className="text-yim-red hover:text-yim-red font-medium"
                                            >
                                                Wis log
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Person Header */}
                        <div className="bg-white rounded-xl border border-yim-200 p-6 mb-6">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-full bg-gradient-to-br from-yim-500 to-yim-600 flex items-center justify-center text-white text-2xl font-semibold">
                                    {profile?.dataGroups.identity === 'show' ? 'JV' : '••'}
                                </div>
                                <div className="flex-1">
                                    <h2 className="text-2xl font-semibold text-yim-600 mb-1">
                                        {profile?.dataGroups.identity === 'show' ? 'Jan de Vries' : '••••••••'}
                                    </h2>
                                    <div className="flex items-center gap-4 text-sm text-yim-600 opacity-70">
                                        <span>{profile?.dataGroups.employment === 'show' ? 'ABC Bouw B.V.' : '••••••••'}</span>
                                        <span className="text-yim-300">•</span>
                                        <span>{profile?.dataGroups.employment === 'show' ? 'Projectleider' : '••••••••'}</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">

            const openRoleEditor = (key) => {
                setSelectedRole(key);
                setEditForm({ ...roles[key] });
                setIsNewRole(false);
            };

            const openNewRoleEditor = () => {
                const newRole = {
                    name: '',
                    description: '',
                    visibilityProfileId: visibilityProfiles[0]?.id || 'minimal'
                };
                setSelectedRole('new');
                setEditForm(newRole);
                setIsNewRole(true);
            };

            const closeRoleEditor = () => {
                setSelectedRole(null);
                setEditForm({});
                setIsNewRole(false);
            };

            const saveRole = () => {
                if (isNewRole) {
                    const key = editForm.name.toLowerCase().replace(/\s+/g, '_');
                    setRoles(prev => ({ ...prev, [key]: editForm }));
                } else {
                    setRoles(prev => ({ ...prev, [selectedRole]: editForm }));
                }
                closeRoleEditor();
            };

            const deleteRole = (key) => {
                setRoles(prev => {
                    const updated = { ...prev };
                    delete updated[key];
                    return updated;
                });
                setDeleteConfirm(null);
                closeRoleEditor();
            };

            // ============ PROFILE EDITOR LOGIC ============

            const initializeProfileGroups = (profile) => {
                const groups = { ...profile.dataGroups };
                dataGroups.forEach(g => {
                    if (!groups[g.id]) groups[g.id] = 'hidden';
                });
                const components = { ...profile.dossierComponents };
                dossierComponents.forEach(c => {
                    if (!components[c.id]) components[c.id] = 'hidden';
                });
                return { ...profile, dataGroups: groups, dossierComponents: components };
            };

            const openProfileEditor = (profileId) => {
                const profile = visibilityProfiles.find(p => p.id === profileId);
                if (!profile) return;
                setSelectedProfile(profileId);
                setProfileEditForm(initializeProfileGroups({ ...profile }));
                setExpandedGroups({});
                setIsNewProfile(false);
                setActiveTab('data_inzage');
            };

            const openNewProfileEditor = () => {
                const newProfile = {
                    id: '',
                    name: '',
                    description: '',
                    canReveal: false,
                    dataGroups: {},
                    dossierComponents: {}
                };
                dataGroups.forEach(g => { newProfile.dataGroups[g.id] = 'hidden'; });
                dossierComponents.forEach(c => { newProfile.dossierComponents[c.id] = 'hidden'; });
                setSelectedProfile('new');
                setProfileEditForm(newProfile);
                setExpandedGroups({});
                setIsNewProfile(true);
                setActiveTab('data_inzage');
            };

            const closeProfileEditor = () => {
                setSelectedProfile(null);
                setProfileEditForm({});
                setExpandedGroups({});
                setActiveTab('data_inzage');
                setIsNewProfile(false);
            };

            const saveProfile = () => {
                if (isNewProfile) {
                    const id = profileEditForm.name.toLowerCase().replace(/\s+/g, '_');
                    setVisibilityProfiles(prev => [...prev, { ...profileEditForm, id }]);
                } else {
                    setVisibilityProfiles(prev => prev.map(p => p.id === selectedProfile ? profileEditForm : p));
                }
                closeProfileEditor();
            };

            const deleteProfile = (profileId) => {
                setVisibilityProfiles(prev => prev.filter(p => p.id !== profileId));
                setDeleteProfileConfirm(null);
                closeProfileEditor();
            };

            // ============ SHARED HELPERS ============

            const toggleGroupExpand = (groupId) => {
                setExpandedGroups(prev => ({ ...prev, [groupId]: !prev[groupId] }));
            };

            const updateProfileGroupVisibility = (groupId, value) => {
                setProfileEditForm(prev => ({
                    ...prev,
                    dataGroups: { ...prev.dataGroups, [groupId]: value }
                }));
            };

            const countVisibleGroups = (obj) => {
                if (!obj) return 0;
                return Object.values(obj).filter(v => v !== 'hidden').length;
            };

            const getProfileForRole = (roleData) => {
                return visibilityProfiles.find(p => p.id === roleData.visibilityProfileId);

            if (selectedProfile) {
                return (
                    <div className="fixed inset-0 bg-yim-100 z-50 overflow-hidden flex flex-col">

                            <h2 className="text-3xl font-bold text-white">Beheer</h2>
                        </div>
                        <nav className="px-8 space-y-1">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveMenu(item.id)}
                                    className={`w-full text-left px-4 py-3 rounded-md font-bold text-base transition-colors ${
                                        activeMenu === item.id
                                            ? 'bg-white/20 text-white'
                                            : 'text-white/50 hover:text-white hover:bg-white/10'
                                    }`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 py-8 pr-6">
                        <div className="flex gap-10">
                            <div className="flex-1">
                                {/* ===== ROLES VIEW ===== */}
                                {activeMenu === 'roles' && (
                                    <>
                                        <div className="flex items-start gap-4 mb-8">
                                            <div className="w-4 h-8 bg-yim-200 rounded-full mt-2"></div>
                                            <div>
                                                <h1 className="text-4xl font-bold text-yim-600">Rollenbeheer</h1>
                                                <p className="text-base font-bold text-yim-600 mt-1">Beheer rollen en hun gekoppelde zichtbaarheidsprofielen</p>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                                            <table className="w-full">
                                                <thead className="bg-yim-600">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Naam</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Beschrijving</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Profiel</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Onthullen</th>
                                                        <th className="px-6 py-3 text-right text-sm font-normal text-white"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {Object.entries(roles).map(([key, roleData]) => {
                                                        const rp = getProfileForRole(roleData);
                                                        return (
                                                            <tr key={key} className="border-t border-yim-200 hover:bg-yim-50 cursor-pointer transition-colors" onClick={() => openRoleEditor(key)}>
                                                                <td className="px-6 py-4"><div className="font-bold text-yim-600">{roleData.name}</div></td>
                                                                <td className="px-6 py-4"><div className="text-sm text-yim-600">{roleData.description}</div></td>
                                                                <td className="px-6 py-4">
                                                                    <span className="inline-flex items-center text-xs text-yim-500 bg-yim-50 px-2 py-1 rounded border border-yim-200">
                                                                        {rp?.name || 'Geen'}
                                                                    </span>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    {rp?.canReveal ? (
                                                                        <span className="inline-flex items-center gap-1 text-xs text-yim-green bg-yim-green/10 px-2 py-1 rounded">
                                                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                                                            Ja
                                                                        </span>
                                                                    ) : (
                                                                        <span className="inline-flex items-center text-xs text-yim-600 opacity-60 bg-yim-100 px-2 py-1 rounded">Nee</span>
                                                                    )}
                                                                </td>
                                                                <td className="px-6 py-4 text-right">
                                                                    <button onClick={(e) => { e.stopPropagation(); openRoleEditor(key); }} className="p-2 text-yim-300 hover:text-yim-600 transition-colors">
                                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                )}

                                {/* ===== PROFILES VIEW ===== */}
                                {activeMenu === 'profiles' && (
                                    <>
                                        <div className="flex items-start gap-4 mb-8">
                                            <div className="w-4 h-8 bg-yim-200 rounded-full mt-2"></div>
                                            <div>
                                                <h1 className="text-4xl font-bold text-yim-600">Zichtbaarheidsprofielen</h1>
                                                <p className="text-base font-bold text-yim-600 mt-1">Beheer welke data-groepen en dossieronderdelen zichtbaar zijn</p>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                                            <table className="w-full">
                                                <thead className="bg-yim-600">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Naam</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Beschrijving</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Groepen</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Dossier</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Onthullen</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Rollen</th>
                                                        <th className="px-6 py-3 text-right text-sm font-normal text-white"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {visibilityProfiles.map(profile => {
                                                        const linkedRoles = Object.entries(roles).filter(([_, r]) => r.visibilityProfileId === profile.id);
                                                        return (
                                                            <tr key={profile.id} className="border-t border-yim-200 hover:bg-yim-50 cursor-pointer transition-colors" onClick={() => openProfileEditor(profile.id)}>
                                                                <td className="px-6 py-4"><div className="font-bold text-yim-600">{profile.name}</div></td>
                                                                <td className="px-6 py-4"><div className="text-sm text-yim-600">{profile.description}</div></td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-sm text-yim-600">{countVisibleGroups(profile.dataGroups)} / {dataGroups.length}</div>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-sm text-yim-600">{countVisibleGroups(profile.dossierComponents)} / {dossierComponents.length}</div>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    {profile.canReveal ? (
                                                                        <span className="inline-flex items-center gap-1 text-xs text-yim-green bg-yim-green/10 px-2 py-1 rounded">
                                                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                                                            Ja
                                                                        </span>
                                                                    ) : (
                                                                        <span className="inline-flex items-center text-xs text-yim-600 opacity-60 bg-yim-100 px-2 py-1 rounded">Nee</span>
                                                                    )}
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <div className="flex flex-wrap gap-1">
                                                                        {linkedRoles.map(([key, r]) => (
                                                                            <span key={key} className="text-xs bg-yim-100 text-yim-600 px-2 py-0.5 rounded">{r.name}</span>
                                                                        ))}
                                                                        {linkedRoles.length === 0 && <span className="text-xs text-yim-600 opacity-40">Geen</span>}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4 text-right">
                                                                    <button onClick={(e) => { e.stopPropagation(); openProfileEditor(profile.id); }} className="p-2 text-yim-300 hover:text-yim-600 transition-colors">
                                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                )}

                                {/* Other menu items - placeholder */}
                                {activeMenu !== 'roles' && activeMenu !== 'profiles' && (
                                    <div className="flex items-start gap-4 mb-8">
                                        <div className="w-4 h-8 bg-yim-200 rounded-full mt-2"></div>
                                        <div>
                                            <h1 className="text-4xl font-bold text-yim-600">{menuItems.find(m => m.id === activeMenu)?.label}</h1>
                                            <p className="text-base font-bold text-yim-600 mt-1 opacity-50">Binnenkort beschikbaar</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Mijn Acties Panel */}
                            <div className="w-72 flex-shrink-0">
                                <div className="bg-yim-700 rounded-bl-lg rounded-br-lg rounded-tl-lg rounded-tr-[110px] px-5 pt-12 pb-8 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-28 h-28 bg-yim-600/30 rounded-bl-full"></div>
                                    <h3 className="text-3xl font-normal text-white mb-8">Mijn acties</h3>

                                    {activeMenu === 'roles' && (
                                        <button onClick={openNewRoleEditor} className="flex items-center gap-4 text-white w-full py-3 hover:bg-white/10 rounded-lg transition-colors">
                                            <div className="w-8 h-8 flex items-center justify-center">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v16m8-8H4" /></svg>
                                            </div>
                                            <span className="text-lg font-semibold">Nieuwe rol toevoegen</span>
                                        </button>
                                    )}

                                    {activeMenu === 'profiles' && (
                                        <button onClick={openNewProfileEditor} className="flex items-center gap-4 text-white w-full py-3 hover:bg-white/10 rounded-lg transition-colors">
                                            <div className="w-8 h-8 flex items-center justify-center">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v16m8-8H4" /></svg>
                                            </div>
                                            <span className="text-lg font-semibold">Nieuw profiel toevoegen</span>
                                        </button>
                                    )}

                                    <div className="mt-16 flex items-center gap-4 text-white">
                                        <div className="w-8 h-8 flex items-center justify-center">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                            </svg>
                                        </div>
                                        <span className="text-lg font-semibold">yimsupport@nsecure.nl</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Root Component with state management
        function Root() {
            const [roles, setRoles] = useState(initialRoles);
            const [visibilityProfiles, setVisibilityProfiles] = useState(initialVisibilityProfiles);
            const [currentTab, setCurrentTab] = useState('viewer');

            return <App roles={roles} setRoles={setRoles} visibilityProfiles={visibilityProfiles} setVisibilityProfiles={setVisibilityProfiles} currentTab={currentTab} setCurrentTab={setCurrentTab} />;
        }

        ReactDOM.render(<Root />, document.getElementById('root'));
    </script>
</body>
</html>
