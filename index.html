              certCategories: { vca: true, vog: true, bhv: true, werkvergunning: true, rijbewijs: true },

            hr: { name: "HR Manager", description: "Persoons- en arbeidsgegevens", canReveal: true, roleSettings: createHRRoleSettings(),
              categories: { identity: true, contact_work: true, address: false, government_id: false, compliance: true, hours: true, employment: true, access: false },
              dossierCategories: { foto: true, identificatie_locatie: true, identificatie_bsn: false, posted_worker: true, sociale_lasten: false, gewerkte_uren: true, vca_certificaten: true },
              certCategories: { vca: true, vog: false, bhv: true, werkvergunning: true, rijbewijs: false },
              fileCategories: { arbeidsovereenkomst: false, loonstroken: false, id_kopie: false, a1_verklaring: true, verzekeringsbewijs: true },
              allowedScopes: { own_company: true, subcontractors: true } },
            security: { name: "Security Manager", description: "Compliance en toegang", canReveal: false, roleSettings: createSecurityRoleSettings(),
              categories: { identity: true, contact_work: false, address: false, government_id: false, compliance: true, hours: true, employment: false, access: true },
              dossierCategories: { foto: true, identificatie_locatie: false, identificatie_bsn: false, posted_worker: false, sociale_lasten: false, gewerkte_uren: true, vca_certificaten: true },
              certCategories: { vca: true, vog: false, bhv: true, werkvergunning: false, rijbewijs: false },
              fileCategories: { arbeidsovereenkomst: false, loonstroken: false, id_kopie: false, a1_verklaring: false, verzekeringsbewijs: false },
              allowedScopes: { own_company: true, subcontractors: false } },
            contractor: { name: "Contractor", description: "Beperkte toegang", canReveal: false, roleSettings: createSecurityRoleSettings(),
              categories: { identity: true, contact_work: false, address: false, government_id: false, compliance: true, hours: true, employment: false, access: true },
              dossierCategories: { foto: true, identificatie_locatie: false, identificatie_bsn: false, posted_worker: false, sociale_lasten: false, gewerkte_uren: true, vca_certificaten: true },
              certCategories: { vca: true, vog: false, bhv: true, werkvergunning: false, rijbewijs: false },
              fileCategories: { arbeidsovereenkomst: false, loonstroken: false, id_kopie: false, a1_verklaring: false, verzekeringsbewijs: false },
              allowedScopes: { own_company: true, subcontractors: false } },
            guest: { name: "Guest", description: "Basis verificatie", canReveal: false, roleSettings: createMinimalRoleSettings(),
              categories: { identity: true, contact_work: false, address: false, government_id: false, compliance: false, hours: false, employment: false, access: false },
              dossierCategories: { foto: false, identificatie_locatie: false, identificatie_bsn: false, posted_worker: false, sociale_lasten: false, gewerkte_uren: false, vca_certificaten: true },
              certCategories: { vca: true, vog: false, bhv: false, werkvergunning: false, rijbewijs: false },
              fileCategories: { arbeidsovereenkomst: false, loonstroken: false, id_kopie: false, a1_verklaring: false, verzekeringsbewijs: false },
              allowedScopes: { own_company: true, subcontractors: false } }
        };

        function App({ roles, setRoles, visibilityProfiles, setVisibilityProfiles, currentTab, setCurrentTab, concept }) {
            const [currentRole, setCurrentRole] = useState('admin');
            const [showHelp, setShowHelp] = useState(true);
            const [auditLog, setAuditLog] = useState([]);
            const [showAudit, setShowAudit] = useState(false);
            const [revealedFields, setRevealedFields] = useState({});

            // Handle deleted role - reset to first available role
            const roleKeys = Object.keys(roles);
            const validRole = roles[currentRole] ? currentRole : roleKeys[0];
            const role = roles[validRole];

            // Resolve visibility based on active concept
            const profile = concept === 'A' ? visibilityProfiles.find(p => p.id === role.visibilityProfileId) : null;
            const canReveal = concept === 'A' ? (profile?.canReveal || false) : (role.canReveal || false);

            // Log field reveal
            const logFieldReveal = (category, field, value) => {
                const entry = {
                    timestamp: new Date().toISOString(),
                    role: role.name,
                    category,
                    field,
                    value: value.substring(0, 20) + (value.length > 20 ? '...' : ''),
                    action: 'FIELD_REVEAL'
                };
                setAuditLog(prev => [entry, ...prev]);
            };

            // Handle field reveal with 5-second timeout
            const handleReveal = (fieldKey, category, field, value) => {
                if (!canReveal) return;

                setRevealedFields(prev => ({ ...prev, [fieldKey]: true }));
                logFieldReveal(category, field, value);

                // Auto-hide after 5 seconds
                setTimeout(() => {
                    setRevealedFields(prev => {
                        const updated = { ...prev };
                        delete updated[fieldKey];
                        return updated;
                    });
                }, 5000);
            };

            // Mask sensitive values (no permission levels - purely based on sensitivity)
            const maskSensitiveValue = (value, sensitive, isRevealed = false) => {
                if (isRevealed || !sensitive) return value;
                if (typeof value === 'string') {
                    if (value.includes('@')) {
                        const [user, domain] = value.split('@');
                        return `${user.substring(0, 2)}••••@${domain}`;
                    }
                    if (value.includes('+31')) return '+31 6 ••••••78';
                    if (value.length > 8) return value.substring(0, 3) + '••••••';
                }
                return '••••••••';
            };

            const DataField = ({ label, value, sensitive, fieldId, groupId }) => {
                // Check visibility based on active concept
                const isVisible = concept === 'A'
                    ? (profile?.dataGroups[groupId] === 'show')
                    : (role.categories?.[groupId] === true);
                if (!isVisible) return null;

                const fieldKey = `${groupId}.${fieldId}`;
                const isRevealed = revealedFields[fieldKey];
                const displayValue = maskSensitiveValue(value, sensitive, isRevealed);
                const isMasked = sensitive && !isRevealed;
                const canRevealField = canReveal && isMasked;

                return (
                    <div className="flex justify-between items-start py-3 border-b border-yim-100 last:border-0 group">
                        <div className="flex items-center gap-2">
                            <span className="text-sm text-yim-600 opacity-70 w-36">{label}</span>
                            {isMasked && (
                                <svg className="w-3.5 h-3.5 text-yim-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            )}
                            {isRevealed && (
                                <span className="flex items-center gap-1 text-xs text-yim-green">
                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    5s
                                </span>
                            )}
                        </div>
                        <div className="flex items-center gap-2">
                            <span className={`text-sm font-medium ${isMasked ? 'text-yim-300' : 'text-yim-600'}`}>
                                {displayValue}
                            </span>
                            {canRevealField && (
                                <button
                                    onClick={() => handleReveal(fieldKey, groupId, label, value)}
                                    className="opacity-0 group-hover:opacity-100 transition-opacity px-2 py-1 text-xs font-medium text-yim-500 hover:text-yim-600 hover:bg-yim-50 rounded"
                                    title="Toon gedurende 5 seconden"
                                >
                                    Toon
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const VisibilityBadge = ({ visible }) => {
                return visible ? (
                    <span className="px-2.5 py-1 rounded-md text-xs font-medium bg-yim-green/10 text-yim-green border border-yim-green/30">
                        Zichtbaar
                    </span>
                ) : (
                    <span className="px-2.5 py-1 rounded-md text-xs font-medium bg-yim-50 text-yim-600 opacity-70 border border-yim-200">
                        Verborgen
                    </span>
                );
            };

            const DataSection = ({ title, groups, icon, children }) => {
                // Section is hidden if ALL its data groups are hidden
                const hasVisibleGroup = concept === 'A'
                    ? groups.some(g => profile?.dataGroups[g] === 'show')
                    : groups.some(g => role.categories?.[g] === true);

                if (!hasVisibleGroup) {
                    return (
                        <div className="bg-white rounded-xl border border-yim-200 p-6 opacity-50">

                                    {icon}
                                </div>

                                <span className="text-xs text-yim-600 opacity-60 flex items-center gap-1">

                                    </svg>
                                    Geen toegang

                                    </svg>
                                    <div>

                                                    ? 'bg-white text-yim-600 shadow-sm'
                                                    : 'text-yim-600 opacity-70 hover:text-yim-600'
                                            }`}

                                            Admin

                                    <div className="p-6 border-b border-yim-200">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <h2 className="text-lg font-semibold text-yim-600">Audit Trail</h2>
                                                <p className="text-sm text-yim-600 opacity-70">Logging van ontsleutelde velden</p>
                                            </div>
                                            <button 
                                                onClick={() => setShowAudit(false)}
                                                className="text-yim-300 hover:text-yim-600 opacity-70"
                                            >
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6">
                                        {auditLog.length === 0 ? (
                                            <div className="text-center py-12">
                                                <svg className="w-16 h-16 text-yim-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                </svg>
                                                <p className="text-yim-600 opacity-60">Nog geen velden ontsleuteld</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {auditLog.map((entry, idx) => (
                                                    <div key={idx} className="bg-yim-50 rounded-lg p-4 border border-yim-200">
                                                        <div className="flex items-start justify-between mb-2">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-xs font-mono text-yim-600 opacity-60">
                                                                    {new Date(entry.timestamp).toLocaleTimeString('nl-NL')}

                                                                <span className="px-2 py-0.5 bg-yim-red/10 text-yim-red text-xs font-medium rounded">
                                                                    {entry.action}

                                                            </div>
                                                            <span className="text-xs text-yim-600 opacity-70">{entry.role}</span>
                                                        </div>
                                                        <div className="text-sm">
                                                            <span className="font-medium text-yim-600">{entry.category}</span>
                                                            <span className="text-yim-300 mx-2">→</span>
                                                            <span className="text-yim-600">{entry.field}</span>

                                                        <div className="mt-2 text-xs text-yim-600 opacity-60 font-mono bg-white px-2 py-1 rounded">

                                            </div>
                                        )}
                                    </div>
                                    <div className="p-6 border-t border-yim-200 bg-yim-50">
                                        <div className="flex items-center justify-between text-sm text-yim-600 opacity-70">
                                            <span>Totaal: {auditLog.length} acties</span>
                                            <button 
                                                onClick={() => setAuditLog([])}
                                                className="text-yim-red hover:text-yim-red font-medium"
                                            >
                                                Wis log
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Person Header */}
                        <div className="bg-white rounded-xl border border-yim-200 p-6 mb-6">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-full bg-gradient-to-br from-yim-500 to-yim-600 flex items-center justify-center text-white text-2xl font-semibold">

                                </div>
                                <div className="flex-1">
                                    <h2 className="text-2xl font-semibold text-yim-600 mb-1">

                                    </h2>

        const getCategoriesForLevel = (level, exceptions = {}) => {
            const compute = (items, exKey) => {
                const result = {};
                items.forEach(item => {
                    const base = CATEGORY_MIN_LEVEL[item.id] <= level;
                    result[item.id] = exceptions[exKey]?.[item.id] !== undefined ? exceptions[exKey][item.id] : base;
                });
                return result;
            };
            return {
                categories: compute(dataGroups, 'categories'),
                dossierCategories: compute(dossierComponents, 'dossierCategories'),
                certCategories: compute(certificateCategories, 'certCategories'),
                fileCategories: compute(fileCategories, 'fileCategories')

        const deriveCategories = (roleSettings) => {
            if (!roleSettings) return { categories: {}, dossierCategories: {}, certCategories: {}, fileCategories: {}, _justifications: {} };
            const result = { categories: {}, dossierCategories: {}, certCategories: {}, fileCategories: {} };
            const justifications = {};
            const addJ = (group, catId, reason) => {
                if (!justifications[group]) justifications[group] = {};
                if (!justifications[group][catId]) justifications[group][catId] = [];
                if (!justifications[group][catId].includes(reason)) justifications[group][catId].push(reason);
            };
            // 1. Taken → categories
            (roleSettings.taken || []).forEach(taskId => {
                const map = TASK_CATEGORY_MAP[taskId];
                if (!map) return;
                const name = TAKEN.find(t => t.id === taskId)?.name || taskId;
                (map.categories || []).forEach(c => { result.categories[c] = true; addJ('categories', c, name); });
                (map.dossier || []).forEach(c => { result.dossierCategories[c] = true; addJ('dossierCategories', c, name); });
                (map.certs || []).forEach(c => { result.certCategories[c] = true; addJ('certCategories', c, name); });
                (map.files || []).forEach(c => { result.fileCategories[c] = true; addJ('fileCategories', c, name); });
            });
            // 2. Dossierniveau → categories
            (roleSettings.dossierniveau || []).forEach(dnId => {
                const map = DOSSIERNIVEAU_MAP[dnId];
                if (!map) return;
                const name = DOSSIERNIVEAU.find(d => d.id === dnId)?.name || dnId;
                (map.categories || []).forEach(c => { result.categories[c] = true; addJ('categories', c, name); });

                (map.certs || []).forEach(c => { result.certCategories[c] = true; addJ('certCategories', c, name); });

                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />

                )
            };

        }

        // Status Dropdown component for dossier components - sophisticated muted colors
        function StatusDropdown({ value, onChange }) {
            const [isOpen, setIsOpen] = useState(false);

            const options = [
                { value: 'show', label: 'Tonen', bgClass: 'bg-emerald-50 border-emerald-200', textClass: 'text-emerald-700', dotClass: 'bg-emerald-500' },
                { value: 'hidden', label: 'Verborgen', bgClass: 'bg-yim-50 border-yim-200', textClass: 'text-yim-600 opacity-60', dotClass: 'bg-yim-300' }
            ];

            const current = options.find(o => o.value === value) || options[2];

            return (
                <div className="relative">
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium border transition-all ${current.bgClass} ${current.textClass} hover:shadow-sm`}
                    >
                        <span className={`w-2 h-2 rounded-full ${current.dotClass}`}></span>
                        {current.label}
                        <svg className={`w-3.5 h-3.5 opacity-50 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>

                    {isOpen && (
                        <>
                            <div className="fixed inset-0 z-10" onClick={() => setIsOpen(false)}></div>
                            <div className="absolute right-0 mt-1 w-40 bg-white rounded-lg shadow-lg border border-yim-200 py-1 z-20">
                                {options.map(option => (
                                    <button
                                        key={option.value}
                                        onClick={() => { onChange(option.value); setIsOpen(false); }}
                                        className={`w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-yim-50 transition-colors ${value === option.value ? 'bg-yim-50' : ''}`}
                                    >
                                        <span className={`w-2 h-2 rounded-full ${option.dotClass}`}></span>
                                        <span className="text-yim-600">{option.label}</span>
                                        {value === option.value && (
                                            <svg className="w-4 h-4 text-yim-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                            </svg>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // ============ DualListSelector Component ============
        function DualListSelector({ items, selected, onChange, maxHeight = 180 }) {
            const [searchL, setSearchL] = useState('');
            const [searchR, setSearchR] = useState('');
            const available = items.filter(i => !selected.includes(i.id));
            const selectedItems = items.filter(i => selected.includes(i.id));
            const filteredAvail = searchL ? available.filter(i => i.name.toLowerCase().includes(searchL.toLowerCase())) : available;
            const filteredSel = searchR ? selectedItems.filter(i => i.name.toLowerCase().includes(searchR.toLowerCase())) : selectedItems;

            const addItem = (id) => onChange([...selected, id]);
            const removeItem = (id) => onChange(selected.filter(x => x !== id));
            const addAll = () => onChange([...selected, ...available.map(i => i.id)]);
            const removeAll = () => onChange([]);

            const ListCol = ({ title, count, total, items: listItems, onClickItem, icon, search, setSearch, actionLabel, onAction }) => (
                <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between mb-1.5">
                        <span className="text-xs font-semibold text-yim-500 uppercase tracking-wide">{title}</span>
                        <span className="text-xs text-yim-400">{count}/{total}</span>
                    </div>
                    {items.length > 8 && (
                        <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                            placeholder="Zoeken..." className="w-full px-2 py-1 text-xs border border-yim-200 rounded mb-1.5 focus:outline-none focus:border-yim-400" />
                    )}
                    <div className="border border-yim-200 rounded-lg bg-white" style={{ maxHeight, overflowY: 'auto' }}>
                        {listItems.length === 0 ? (
                            <div className="px-3 py-4 text-xs text-yim-400 text-center italic">Geen items</div>
                        ) : listItems.map(item => (
                            <div key={item.id} onClick={() => onClickItem(item.id)}
                                className="flex items-center gap-2 px-3 py-1.5 text-sm text-yim-700 hover:bg-yim-50 cursor-pointer border-b border-yim-100 last:border-b-0 transition-colors">
                                <span className="flex-1 truncate">{item.name}</span>
                                <span className="text-yim-400 text-xs flex-shrink-0">{icon}</span>
                            </div>
                        ))}
                    </div>
                    {total > 0 && (
                        <button onClick={onAction} className="mt-1.5 text-xs text-yim-500 hover:text-yim-700 font-medium transition-colors">
                            {actionLabel}
                        </button>
                    )}
                </div>
            );

            return (
                <div className="flex gap-3">
                    <ListCol title="Beschikbaar" count={available.length} total={items.length}
                        items={filteredAvail} onClickItem={addItem} icon="→" search={searchL} setSearch={setSearchL}
                        actionLabel={`Alles toevoegen (${available.length})`} onAction={addAll} />
                    <ListCol title="Geselecteerd" count={selectedItems.length} total={items.length}
                        items={filteredSel} onClickItem={removeItem} icon="←" search={searchR} setSearch={setSearchR}
                        actionLabel="Alles verwijderen" onAction={removeAll} />
                </div>
            );
        }

        // ============ RoleSettingsPanel Component (flat form layout matching Figma) ============
        function RoleSettingsPanel({ roleSettings, onChange, concept }) {
            if (!roleSettings) return null;

            const updateField = (field, value) => {
                onChange({ ...roleSettings, [field]: value });
            };

            // Render a dual-list row with alternating background
            const renderRow = (row, rowIdx) => {
                const isEven = rowIdx % 2 === 0;
                return (
                    <div key={row.id} className={isEven ? 'bg-[#f0f5f7]' : 'border-t border-yim-200'}>
                        <div className="grid items-start p-4" style={{ gridTemplateColumns: '240px 1fr' }}>
                            <label className="text-base font-semibold text-yim-700 pr-5 py-2">{row.name}</label>
                            <DualListSelector items={row.items} selected={roleSettings[row.id] || []}
                                onChange={(val) => updateField(row.id, val)} maxHeight={140} />
                        </div>
                    </div>
                );
            };

            // Render a select/dropdown row
            const renderSelectRow = (row, rowIdx) => {
                const isEven = rowIdx % 2 === 0;
                return (
                    <div key={row.id} className={isEven ? 'bg-[#f0f5f7]' : 'border-t border-yim-200'}>
                        <div className="grid items-center p-4" style={{ gridTemplateColumns: '240px 1fr' }}>
                            <label className="text-base font-semibold text-yim-700 pr-5 py-2">{row.name}</label>
                            <select value={roleSettings[row.id] || ''} onChange={(e) => updateField(row.id, e.target.value)}
                                className="px-3 py-2.5 border border-yim-300 rounded bg-white text-sm focus:ring-2 focus:ring-yim-500 focus:border-yim-500" style={{ width: 320 }}>
                                <option value=""></option>
                                {row.options.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}
                            </select>
                        </div>
                    </div>
                );
            };

            // Render a Ja/Nee toggle row (inside a card)
            const renderToggleRow = (label, field) => (
                <div className="bg-[#f0f5f7]">
                    <div className="grid items-center p-4" style={{ gridTemplateColumns: '240px 1fr' }}>
                        <label className="text-base font-semibold text-yim-700 pr-5 py-2">{label}</label>
                        <div className="inline-flex rounded border border-yim-200 overflow-hidden">
                            <button onClick={() => updateField(field, true)}
                                className={`px-8 py-2 text-sm font-medium transition-all ${roleSettings[field] ? 'bg-yim-500 text-white' : 'bg-white text-yim-600 hover:bg-yim-50'}`}>Ja</button>
                            <button onClick={() => updateField(field, false)}
                                className={`px-8 py-2 text-sm font-medium transition-all ${!roleSettings[field] ? 'bg-yim-500 text-white' : 'bg-white text-yim-600 hover:bg-yim-50'}`}>Nee</button>
                        </div>
                    </div>
                </div>
            );

            // Section header inside a card
            const renderSectionHeader = (name) => (
                <div className="px-12 py-5">
                    <h3 className="text-[30px] font-bold text-yim-700" style={{ fontFamily: 'Nunito, sans-serif' }}>{name}</h3>
                </div>
            );

            // Render a section card
            const renderSectionCard = (section) => (
                <div key={section.id} className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                    {section.header && renderSectionHeader(section.name)}
                    {section.rows.map((row, rowIdx) =>
                        row.type === 'select'
                            ? renderSelectRow(row, rowIdx)
                            : renderRow(row, rowIdx)
                    )}
                </div>
            );

            return (
                <div className="space-y-3">
                    {ROLE_SETTINGS_SECTIONS.map(renderSectionCard)}

                    {/* Delegatie */}
                    <div className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                        {renderSectionHeader('Delegatie')}
                        {renderToggleRow('Rol kan worden gedelegeerd', 'delegatie')}
                    </div>

                    {/* Bedrijven */}
                    <div className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                        {renderSectionHeader('Bedrijven')}
                        {renderToggleRow('Accrediteer alle bedrijven', 'accrediteer_alle_bedrijven')}
                    </div>
                </div>
            );
        }

        // Admin Panel Component - with profiles management and role editor
        function AdminPanel({ roles, setRoles, visibilityProfiles, setVisibilityProfiles, concept }) {
            const [selectedRole, setSelectedRole] = useState(null);
            const [selectedProfile, setSelectedProfile] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [profileEditForm, setProfileEditForm] = useState({});
            const [expandedGroups, setExpandedGroups] = useState({});
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [deleteProfileConfirm, setDeleteProfileConfirm] = useState(null);
            const [isNewRole, setIsNewRole] = useState(false);
            const [isNewProfile, setIsNewProfile] = useState(false);
            const [activeTab, setActiveTab] = useState('data_inzage');
            const [presetOpen, setPresetOpen] = useState(false);
            const [activeMenu, setActiveMenu] = useState('roles');
            const [showAllRoles, setShowAllRoles] = useState(false);
            const [saveConfirm, setSaveConfirm] = useState(false);

            // Sidebar menu items for Beheer
            const allMenuItems = [
                { id: 'roles', label: 'Rollenbeheer' },
                { id: 'profiles', label: 'Zichtbaarheidsprofielen', conceptA: true },
                { id: 'users', label: 'Gebruikersbeheer' },
                { id: 'access', label: 'Toegangsrechten' },
                { id: 'events', label: 'Evenementenbeheer' },
                { id: 'config', label: 'Configuratiebeheer' }
            ];
            const menuItems = allMenuItems.filter(item => !item.conceptA || concept === 'A');

            // ============ ROLE EDITOR LOGIC ============

            const openRoleEditor = (key) => {
                setSelectedRole(key);
                setEditForm({ ...roles[key] });
                setIsNewRole(false);
            };

            const openNewRoleEditor = () => {
                const newRole = concept === 'A'
                    ? { name: '', description: '', visibilityProfileId: visibilityProfiles[0]?.id || 'minimal', roleSettings: createDefaultRoleSettings() }
                    : concept === 'C'
                    ? { name: '', description: '', sensitivityLevel: 2, exceptions: {}, canReveal: false, roleSettings: createDefaultRoleSettings(),
                        ...getCategoriesForLevel(2), allowedScopes: { own_company: true, subcontractors: false } }
                    : concept === 'D'
                    ? (() => { const rs = createDefaultRoleSettings(); const derived = deriveCategories(rs); return { name: '', description: '', canReveal: false, roleSettings: rs, categories: derived.categories, dossierCategories: derived.dossierCategories, certCategories: derived.certCategories, fileCategories: derived.fileCategories, _justifications: derived._justifications, allowedScopes: { own_company: true, subcontractors: false } }; })()
                    : { name: '', description: '', canReveal: false, roleSettings: createDefaultRoleSettings(),
                        categories: Object.fromEntries(dataGroups.map(g => [g.id, false])),
                        dossierCategories: Object.fromEntries(dossierComponents.map(c => [c.id, false])),
                        certCategories: Object.fromEntries(certificateCategories.map(c => [c.id, false])),
                        fileCategories: Object.fromEntries(fileCategories.map(c => [c.id, false])),
                        allowedScopes: { own_company: true, subcontractors: false }
                      };
                setSelectedRole('new');
                setEditForm(newRole);
                setIsNewRole(true);
            };

            const closeRoleEditor = () => {
                setSelectedRole(null);
                setEditForm({});
                setIsNewRole(false);
            };

            const saveRole = () => {
                if (isNewRole) {
                    const key = editForm.name.toLowerCase().replace(/\s+/g, '_');
                    setRoles(prev => ({ ...prev, [key]: editForm }));
                } else {
                    setRoles(prev => ({ ...prev, [selectedRole]: editForm }));
                }
                closeRoleEditor();
            };

            const deleteRole = (key) => {
                setRoles(prev => {
                    const updated = { ...prev };
                    delete updated[key];
                    return updated;
                });
                setDeleteConfirm(null);
                closeRoleEditor();
            };

            // ============ PROFILE EDITOR LOGIC ============

            const initializeProfileGroups = (profile) => {
                const groups = { ...profile.dataGroups };
                dataGroups.forEach(g => {
                    if (!groups[g.id]) groups[g.id] = 'hidden';
                });
                const components = { ...profile.dossierComponents };
                dossierComponents.forEach(c => {
                    if (!components[c.id]) components[c.id] = 'hidden';
                });
                return { ...profile, dataGroups: groups, dossierComponents: components };
            };

            const openProfileEditor = (profileId) => {
                const profile = visibilityProfiles.find(p => p.id === profileId);
                if (!profile) return;
                setSelectedProfile(profileId);
                setProfileEditForm(initializeProfileGroups({ ...profile }));
                setExpandedGroups({});
                setIsNewProfile(false);
                setActiveTab('data_inzage');
                setShowAllRoles(false);
                setSaveConfirm(false);
            };

            const openNewProfileEditor = () => {
                const newProfile = {
                    id: '',
                    name: '',
                    description: '',
                    canReveal: false,
                    dataGroups: {},
                    dossierComponents: {}
                };
                dataGroups.forEach(g => { newProfile.dataGroups[g.id] = 'hidden'; });
                dossierComponents.forEach(c => { newProfile.dossierComponents[c.id] = 'hidden'; });
                setSelectedProfile('new');
                setProfileEditForm(newProfile);
                setExpandedGroups({});
                setIsNewProfile(true);
                setActiveTab('data_inzage');
            };

            const closeProfileEditor = () => {
                setSelectedProfile(null);
                setProfileEditForm({});
                setExpandedGroups({});
                setActiveTab('data_inzage');
                setIsNewProfile(false);
                setShowAllRoles(false);
                setSaveConfirm(false);
            };

            const confirmSaveProfile = () => {
                if (isNewProfile) {
                    const id = profileEditForm.name.toLowerCase().replace(/\s+/g, '_');
                    setVisibilityProfiles(prev => [...prev, { ...profileEditForm, id }]);
                } else {
                    setVisibilityProfiles(prev => prev.map(p => p.id === selectedProfile ? profileEditForm : p));
                }
                closeProfileEditor();
            };

            const saveProfile = () => {
                const linked = Object.entries(roles).filter(([_, r]) => r.visibilityProfileId === selectedProfile);
                if (!isNewProfile && linked.length > 0) {
                    setSaveConfirm(true);
                } else {
                    confirmSaveProfile();
                }

            const deleteProfile = (profileId) => {
                setVisibilityProfiles(prev => prev.filter(p => p.id !== profileId));

                closeProfileEditor();

            // ============ SHARED HELPERS ============

            const updateProfileGroupVisibility = (groupId, value) => {
                setProfileEditForm(prev => ({
                    ...prev,
                    dataGroups: { ...prev.dataGroups, [groupId]: value }
                }));
            };

            const countVisibleGroups = (obj) => {
                if (!obj) return 0;
                return Object.values(obj).filter(v => v !== 'hidden').length;
            };

            const getProfileForRole = (roleData) => {
                return visibilityProfiles.find(p => p.id === roleData.visibilityProfileId);
            };

            // ============ PROFILE EDITOR MODAL ============

            if (selectedProfile) {
                const linkedRoles = isNewProfile ? [] : Object.entries(roles).filter(([_, r]) => r.visibilityProfileId === selectedProfile);
                const impactCount = linkedRoles.length;
                const impactColor = impactCount === 0 ? 'text-yim-600 opacity-50' : impactCount <= 5 ? 'bg-yim-orange/10 text-yim-orange' : 'bg-yim-red/10 text-yim-red';
                const impactIcon = impactCount <= 5 ? 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z' : 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z';
                const visibleRoles = showAllRoles ? linkedRoles : linkedRoles.slice(0, 3);
                return (
                    <div className="fixed inset-0 bg-yim-100 z-50 overflow-hidden flex flex-col">
                        <div className="bg-white border-b border-yim-200 px-6 py-4 flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={closeProfileEditor} className="p-2 text-yim-300 hover:text-yim-600 opacity-70 hover:bg-yim-100 rounded-lg transition-colors">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                                <div>
                                    <h2 className="text-lg font-semibold text-yim-600">
                                        {isNewProfile ? 'Nieuw profiel aanmaken' : profileEditForm.name || 'Profiel bewerken'}
                                    </h2>
                                    <p className="text-sm text-yim-600 opacity-60">
                                        {countVisibleGroups(profileEditForm.dataGroups)}/{dataGroups.length} groepen · {countVisibleGroups(profileEditForm.dossierComponents)}/{dossierComponents.length} componenten
                                    </p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {!isNewProfile && (
                                    <button onClick={() => setDeleteProfileConfirm(selectedProfile)} className="px-4 py-2 text-sm text-yim-red hover:bg-yim-red/10 rounded-lg transition-colors">
                                        Verwijderen
                                    </button>
                                )}
                                <button onClick={closeProfileEditor} className="px-4 py-2 text-sm text-yim-600 hover:bg-yim-100 rounded-lg transition-colors">
                                    Annuleren
                                </button>
                                <button onClick={saveProfile} disabled={!profileEditForm.name} className="px-5 py-2 bg-yim-500 text-white text-sm font-medium rounded-lg hover:bg-yim-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                    {isNewProfile ? 'Profiel aanmaken' : 'Opslaan'}
                                </button>
                            </div>

                        {/* Impact Banner */}
                        {!isNewProfile && (
                            <div className={`px-6 py-3 border-b border-yim-200 ${impactCount === 0 ? 'bg-yim-50' : impactCount <= 5 ? 'bg-yim-orange/5 border-yim-orange/20' : 'bg-yim-red/5 border-yim-red/20'}`}>
                                <div className="max-w-4xl mx-auto flex items-center gap-3">
                                    {impactCount > 0 && (
                                        <svg className={`w-4 h-4 flex-shrink-0 ${impactCount <= 5 ? 'text-yim-orange' : 'text-yim-red'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={impactIcon} />
                                        </svg>

                                </div>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto p-6">

                                                <label className="block text-xs font-medium text-yim-600 opacity-60 mb-1.5 uppercase tracking-wide">Beschrijving</label>
                                                <input type="text" value={profileEditForm.description || ''} onChange={(e) => setProfileEditForm(prev => ({ ...prev, description: e.target.value }))} className="w-full px-3 py-2.5 border border-yim-300 rounded-lg text-sm focus:ring-2 focus:ring-yim-500 focus:border-yim-500" placeholder="Korte beschrijving" />
