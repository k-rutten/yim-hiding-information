                                        <h3 className="text-sm font-semibold text-yim-600">Zichtbaarheidsprofiel</h3>
                                    </div>
                                    <div className="p-5">
                                        <label className="block text-xs font-medium text-yim-600 opacity-60 mb-1.5 uppercase tracking-wide">Gekoppeld profiel</label>
                                        <select
                                            value={editForm.visibilityProfileId || ''}
                                            onChange={(e) => setEditForm(prev => ({ ...prev, visibilityProfileId: e.target.value }))}
                                            className="w-full px-3 py-2.5 border border-yim-300 rounded-lg text-sm focus:ring-2 focus:ring-yim-500 focus:border-yim-500"
                                        >
                                            {visibilityProfiles.map(p => (
                                                <option key={p.id} value={p.id}>{p.name} — {p.description}</option>
                                            ))}
                                        </select>

                                        {/* Profile Preview */}
                                        {linkedProfile && (
                                            <div className="mt-4 p-4 bg-yim-50 rounded-lg border border-yim-200">
                                                <div className="flex items-center justify-between mb-3">
                                                    <span className="text-xs font-medium text-yim-600 opacity-60 uppercase tracking-wide">Preview: {linkedProfile.name}</span>
                                                    {linkedProfile.canReveal && (
                                                        <span className="inline-flex items-center gap-1 text-xs text-yim-green bg-yim-green/10 px-2 py-0.5 rounded">
                                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                            </svg>
                                                            Kan onthullen
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <p className="text-xs font-medium text-yim-600 mb-2">Data-groepen</p>
                                                        <div className="flex flex-wrap gap-1">
                                                            {dataGroups.map(g => (
                                                                <span key={g.id} className={`px-2 py-0.5 text-xs rounded ${linkedProfile.dataGroups[g.id] === 'show' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-yim-100 text-yim-600 opacity-50 border border-yim-200'}`}>
                                                                    {g.name.split(' ')[0]}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <p className="text-xs font-medium text-yim-600 mb-2">Dossier componenten</p>
                                                        <div className="flex flex-wrap gap-1">
                                                            {dossierComponents.map(c => (
                                                                <span key={c.id} className={`px-2 py-0.5 text-xs rounded ${linkedProfile.dossierComponents[c.id] === 'show' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-yim-100 text-yim-600 opacity-50 border border-yim-200'}`}>
                                                                    {c.name.split(' ')[0]}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                )}

                                {/* OLD CONCEPT B BLOCK REMOVED - replaced by preset-first UI above */}

                            </div>
                        </div>

                        {/* Delete Confirmation */}
                        {deleteConfirm && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                                <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 mx-4">
                                    <h3 className="text-lg font-semibold text-yim-600 mb-2">Rol verwijderen?</h3>
                                    <p className="text-sm text-yim-600 opacity-70 mb-6">
                                        Weet je zeker dat je "{editForm.name}" wilt verwijderen?
                                    </p>
                                    <div className="flex justify-end gap-2">
                                        <button onClick={() => setDeleteConfirm(null)} className="px-4 py-2 text-sm text-yim-600 hover:bg-yim-100 rounded-lg">Annuleren</button>
                                        <button onClick={() => deleteRole(deleteConfirm)} className="px-4 py-2 bg-yim-red text-white text-sm font-medium rounded-lg hover:bg-yim-red/80">Verwijderen</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // ============ MAIN OVERVIEW ============

            return (
                <div className="flex gap-10 -mx-6 -mt-8">
                    {/* Sidebar */}
                    <div className="w-72 bg-yim-700 min-h-[calc(100vh-90px)] flex-shrink-0">
                        <div className="px-8 pt-8 pb-6">
                            <h2 className="text-3xl font-bold text-white">Beheer</h2>
                        </div>
                        <nav className="px-8 space-y-1">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveMenu(item.id)}
                                    className={`w-full text-left px-4 py-3 rounded-md font-bold text-base transition-colors ${
                                        activeMenu === item.id
                                            ? 'bg-white/20 text-white'
                                            : 'text-white/50 hover:text-white hover:bg-white/10'
                                    }`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 py-8 pr-6">
                        <div className="flex gap-10">
                            <div className="flex-1">
                                {/* ===== ROLES VIEW ===== */}
                                {activeMenu === 'roles' && (
                                    <>
                                        <div className="flex items-start gap-4 mb-8">
                                            <div className="w-4 h-8 bg-yim-200 rounded-full mt-2"></div>
                                            <div>
                                                <h1 className="text-4xl font-bold text-yim-600">Rollenbeheer</h1>
                                                <p className="text-base font-bold text-yim-600 mt-1">{concept === 'A' ? 'Beheer rollen en hun gekoppelde zichtbaarheidsprofielen' : 'Beheer rollen en hun categorie-instellingen'}</p>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                                            <table className="w-full">
                                                <thead className="bg-yim-600">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Naam</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Beschrijving</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">
                                                            {concept === 'A' ? 'Profiel' : concept === 'B' ? 'Data zichtbaarheid' : concept === 'C' ? 'Inzageniveau' : 'Afleiding'}
                                                        </th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Onthullen</th>
                                                        <th className="px-6 py-3 text-right text-sm font-normal text-white"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {Object.entries(roles).map(([key, roleData]) => {
                                                        const rp = concept === 'A' ? getProfileForRole(roleData) : null;
                                                        const catCount = ['B','C','D'].includes(concept) ? Object.values(roleData.categories || {}).filter(Boolean).length : 0;
                                                        const dossierCount = ['B','C','D'].includes(concept) ? Object.values(roleData.dossierCategories || {}).filter(Boolean).length : 0;
                                                        const certCount = ['B','C','D'].includes(concept) ? Object.values(roleData.certCategories || {}).filter(Boolean).length : 0;
                                                        const fileCount = ['B','C','D'].includes(concept) ? Object.values(roleData.fileCategories || {}).filter(Boolean).length : 0;
                                                        const roleTotalCat = catCount + dossierCount + certCount + fileCount;
                                                        const roleTotalMax = dataGroups.length + dossierComponents.length + certificateCategories.length + fileCategories.length;
                                                        const roleCanReveal = concept === 'A' ? rp?.canReveal : roleData.canReveal;
                                                        return (
                                                            <tr key={key} className="border-t border-yim-200 hover:bg-yim-50 cursor-pointer transition-colors" onClick={() => openRoleEditor(key)}>
                                                                <td className="px-6 py-4"><div className="font-bold text-yim-600">{roleData.name}</div></td>
                                                                <td className="px-6 py-4"><div className="text-sm text-yim-600">{roleData.description}</div></td>
                                                                <td className="px-6 py-4">
                                                                    {concept === 'A' ? (
                                                                        <span className="inline-flex items-center text-xs text-yim-500 bg-yim-50 px-2 py-1 rounded border border-yim-200">
                                                                            {rp?.name || 'Geen'}
                                                                        </span>
                                                                    ) : concept === 'C' ? (() => {
                                                                        const lvl = SENSITIVITY_LEVELS.find(l => l.level === roleData.sensitivityLevel);
                                                                        const exCount = Object.values(roleData.exceptions || {}).reduce((sum, obj) => sum + Object.keys(obj || {}).length, 0);
                                                                        const scopeLabel = roleData.allowedScopes?.subcontractors ? 'Incl. onderaannemers' : 'Eigen organisatie';
                                                                        return (
                                                                            <div className="flex flex-wrap items-center gap-1.5">
                                                                                <span className="inline-flex items-center text-xs font-medium px-2 py-1 rounded border" style={{color: lvl?.color, borderColor: lvl?.color + '40', backgroundColor: lvl?.color + '10'}}>{lvl?.name}</span>
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{roleTotalCat}/{roleTotalMax}</span>
                                                                                {exCount > 0 && <><span className="text-xs text-yim-400">·</span><span className="text-xs text-yim-orange">{exCount}x uitzondering</span></>}
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{scopeLabel}</span>
                                                                            </div>
                                                                        );
                                                                    })() : concept === 'D' ? (() => {
                                                                        const takenCount = (roleData.roleSettings?.taken || []).length;
                                                                        const scopeLabel = roleData.allowedScopes?.subcontractors ? 'Incl. onderaannemers' : 'Eigen organisatie';
                                                                        return (
                                                                            <div className="flex flex-wrap items-center gap-1.5">
                                                                                <span className="inline-flex items-center text-xs font-medium text-purple-600 bg-purple-50 px-2 py-1 rounded border border-purple-200">Afgeleid</span>
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{takenCount} taken</span>
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{roleTotalCat}/{roleTotalMax} cat.</span>
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{scopeLabel}</span>
                                                                            </div>
                                                                        );
                                                                    })() : (() => {
                                                                        const rowPreset = matchPreset(roleData);
                                                                        const scopeLabel = roleData.allowedScopes?.subcontractors ? 'Incl. onderaannemers' : 'Eigen organisatie';
                                                                        return (
                                                                            <div className="flex flex-wrap items-center gap-1.5">
                                                                                <span className="inline-flex items-center text-xs font-medium text-yim-600 bg-yim-50 px-2 py-1 rounded border border-yim-200">
                                                                                    {rowPreset ? rowPreset.name : 'Aangepast'}
                                                                                </span>
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{roleTotalCat}/{roleTotalMax}</span>
                                                                                <span className="text-xs text-yim-400">·</span>
                                                                                <span className="text-xs text-yim-500">{scopeLabel}</span>
                                                                            </div>
                                                                        );
                                                                    })()}
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    {roleCanReveal ? (
                                                                        <span className="inline-flex items-center gap-1 text-xs text-yim-green bg-yim-green/10 px-2 py-1 rounded">
                                                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                                                            Ja
                                                                        </span>
                                                                    ) : (
                                                                        <span className="inline-flex items-center text-xs text-yim-600 opacity-60 bg-yim-100 px-2 py-1 rounded">Nee</span>
                                                                    )}
                                                                </td>
                                                                <td className="px-6 py-4 text-right">
                                                                    <button onClick={(e) => { e.stopPropagation(); openRoleEditor(key); }} className="p-2 text-yim-300 hover:text-yim-600 transition-colors">
                                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                )}

                                {/* ===== PROFILES VIEW ===== */}
                                {activeMenu === 'profiles' && (
                                    <>
                                        <div className="flex items-start gap-4 mb-8">
                                            <div className="w-4 h-8 bg-yim-200 rounded-full mt-2"></div>
                                            <div>
                                                <h1 className="text-4xl font-bold text-yim-600">Zichtbaarheidsprofielen</h1>
                                                <p className="text-base font-bold text-yim-600 mt-1">Beheer welke data-groepen en dossieronderdelen zichtbaar zijn</p>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-lg border border-yim-200 overflow-hidden">
                                            <table className="w-full">
                                                <thead className="bg-yim-600">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Naam</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Beschrijving</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Groepen</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Dossier</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Onthullen</th>
                                                        <th className="px-6 py-3 text-left text-sm font-normal text-white">Rollen</th>
                                                        <th className="px-6 py-3 text-right text-sm font-normal text-white"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {visibilityProfiles.map(profile => {
                                                        const linkedRoles = Object.entries(roles).filter(([_, r]) => r.visibilityProfileId === profile.id);
                                                        return (
                                                            <tr key={profile.id} className="border-t border-yim-200 hover:bg-yim-50 cursor-pointer transition-colors" onClick={() => openProfileEditor(profile.id)}>
                                                                <td className="px-6 py-4"><div className="font-bold text-yim-600">{profile.name}</div></td>
                                                                <td className="px-6 py-4"><div className="text-sm text-yim-600">{profile.description}</div></td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-sm text-yim-600">{countVisibleGroups(profile.dataGroups)} / {dataGroups.length}</div>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-sm text-yim-600">{countVisibleGroups(profile.dossierComponents)} / {dossierComponents.length}</div>
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    {profile.canReveal ? (
                                                                        <span className="inline-flex items-center gap-1 text-xs text-yim-green bg-yim-green/10 px-2 py-1 rounded">
                                                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                                                            Ja
                                                                        </span>
                                                                    ) : (
                                                                        <span className="inline-flex items-center text-xs text-yim-600 opacity-60 bg-yim-100 px-2 py-1 rounded">Nee</span>
                                                                    )}
                                                                </td>
                                                                <td className="px-6 py-4">
                                                                    <div className="flex flex-wrap gap-1">
                                                                        {linkedRoles.map(([key, r]) => (
                                                                            <span key={key} className="text-xs bg-yim-100 text-yim-600 px-2 py-0.5 rounded">{r.name}</span>
                                                                        ))}
                                                                        {linkedRoles.length === 0 && <span className="text-xs text-yim-600 opacity-40">Geen</span>}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4 text-right">
                                                                    <button onClick={(e) => { e.stopPropagation(); openProfileEditor(profile.id); }} className="p-2 text-yim-300 hover:text-yim-600 transition-colors">
                                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                )}

                                {/* Other menu items - placeholder */}
                                {activeMenu !== 'roles' && activeMenu !== 'profiles' && (
                                    <div className="flex items-start gap-4 mb-8">
                                        <div className="w-4 h-8 bg-yim-200 rounded-full mt-2"></div>
                                        <div>
                                            <h1 className="text-4xl font-bold text-yim-600">{menuItems.find(m => m.id === activeMenu)?.label}</h1>
                                            <p className="text-base font-bold text-yim-600 mt-1 opacity-50">Binnenkort beschikbaar</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Mijn Acties Panel */}
                            <div className="w-72 flex-shrink-0">
                                <div className="bg-yim-700 rounded-bl-lg rounded-br-lg rounded-tl-lg rounded-tr-[110px] px-5 pt-12 pb-8 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-28 h-28 bg-yim-600/30 rounded-bl-full"></div>
                                    <h3 className="text-3xl font-normal text-white mb-8">Mijn acties</h3>

                                    {activeMenu === 'roles' && (
                                        <button onClick={openNewRoleEditor} className="flex items-center gap-4 text-white w-full py-3 hover:bg-white/10 rounded-lg transition-colors">
                                            <div className="w-8 h-8 flex items-center justify-center">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v16m8-8H4" /></svg>
                                            </div>
                                            <span className="text-lg font-semibold">Nieuwe rol toevoegen</span>
                                        </button>
                                    )}

                                    {activeMenu === 'profiles' && concept === 'A' && (
                                        <button onClick={openNewProfileEditor} className="flex items-center gap-4 text-white w-full py-3 hover:bg-white/10 rounded-lg transition-colors">
                                            <div className="w-8 h-8 flex items-center justify-center">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v16m8-8H4" /></svg>
                                            </div>
                                            <span className="text-lg font-semibold">Nieuw profiel toevoegen</span>
                                        </button>
                                    )}

                                    <div className="mt-16 flex items-center gap-4 text-white">
                                        <div className="w-8 h-8 flex items-center justify-center">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                            </svg>
                                        </div>
                                        <span className="text-lg font-semibold">yimsupport@nsecure.nl</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Root Component with state management + concept toggle
        function Root() {
            const [concept, setConcept] = useState('A');
            const [rolesA, setRolesA] = useState(initialRolesA);
            const [rolesB, setRolesB] = useState(initialRolesB);
            const [rolesC, setRolesC] = useState(initialRolesC);
            const [rolesD, setRolesD] = useState(initialRolesD);
            const [visibilityProfiles, setVisibilityProfiles] = useState(initialVisibilityProfiles);
            const [currentTab, setCurrentTab] = useState('viewer');

            const roles = concept === 'A' ? rolesA : concept === 'B' ? rolesB : concept === 'C' ? rolesC : rolesD;
            const setRoles = concept === 'A' ? setRolesA : concept === 'B' ? setRolesB : concept === 'C' ? setRolesC : setRolesD;

            return (
                <div>
                    {/* Fixture Toggle */}
                    <div className="bg-yim-950 text-white">
                        <div className="max-w-6xl mx-auto px-6 py-2.5 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-xs font-medium text-white/50 uppercase tracking-wider">Concept</span>
                                <div className="flex bg-white/10 rounded-lg p-0.5">
                                    <button onClick={() => setConcept('A')} className={`px-2.5 py-1.5 text-xs font-semibold rounded-md transition-all ${concept === 'A' ? 'bg-yim-orange text-white shadow-sm' : 'text-white/60 hover:text-white'}`}>
                                        A: Profielen
                                    </button>
                                    <button onClick={() => setConcept('B')} className={`px-2.5 py-1.5 text-xs font-semibold rounded-md transition-all ${concept === 'B' ? 'bg-yim-green text-white shadow-sm' : 'text-white/60 hover:text-white'}`}>
                                        B: Categorieën
                                    </button>
                                    <button onClick={() => setConcept('C')} className={`px-2.5 py-1.5 text-xs font-semibold rounded-md transition-all ${concept === 'C' ? 'bg-blue-500 text-white shadow-sm' : 'text-white/60 hover:text-white'}`}>
                                        C: Inzageniveau
                                    </button>
                                    <button onClick={() => setConcept('D')} className={`px-2.5 py-1.5 text-xs font-semibold rounded-md transition-all ${concept === 'D' ? 'bg-purple-500 text-white shadow-sm' : 'text-white/60 hover:text-white'}`}>
                                        D: Afleiding
                                    </button>
                                </div>
                            </div>
                            <p className="text-xs text-white/40">
                                {concept === 'A' ? 'Profiel = bron van waarheid · Profielwijziging raakt alle gekoppelde rollen'
                                 : concept === 'B' ? 'Rol = bron van waarheid · Presets vullen categorieën in, geen link bewaard'
                                 : concept === 'C' ? 'Eén gevoeligheidsniveau per rol · Uitzonderingen optioneel'
                                 : 'Automatische afleiding · Categorieën volgen uit rolinstellingen'}
                            </p>
                        </div>
                    </div>
                    <App roles={roles} setRoles={setRoles} visibilityProfiles={visibilityProfiles} setVisibilityProfiles={setVisibilityProfiles} currentTab={currentTab} setCurrentTab={setCurrentTab} concept={concept} />
                </div>
            );
        }

        ReactDOM.render(<Root />, document.getElementById('root'));
    </script>
</body>
</html>
